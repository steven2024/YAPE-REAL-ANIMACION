<body>

     target="_blank">
     <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
  </a>

  <script>
    (function() {

      function esMovil() {
        return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
      }

      function estaBloqueadoPorFecha() {
        const hoy = new Date();
        const fechaLocal = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
        const corte = new Date(2026, 2, 27);
        return fechaLocal >= corte;
      }

      // 🔒 BLOQUEO POR FECHA
      if (estaBloqueadoPorFecha()) {
        document.body.innerHTML = `
          <style>
            .expired-wrap {
              min-height: 100vh;
              display: flex;
              align-items: center;
              justify-content: center;
              background: linear-gradient(160deg, #0b1020 0%, #111827 60%, #1f2937 100%);
              color: #f9fafb;
              font-family: Arial, sans-serif;
              padding: 24px;
              box-sizing: border-box;
            }

            .expired-card {
              width: min(560px, 100%);
              background: rgba(17, 24, 39, 0.95);
              border: 1px solid rgba(148, 163, 184, 0.28);
              border-radius: 14px;
              padding: 28px;
              text-align: center;
              box-shadow: 0 16px 45px rgba(0, 0, 0, 0.35);
            }

            .expired-title {
              margin: 0 0 12px 0;
              font-size: 28px;
            }

            .expired-text {
              margin: 6px 0;
              color: #cbd5e1;
              line-height: 1.5;
            }

            .expired-cta {
              display: inline-block;
              margin-top: 20px;
              background: #25D366;
              color: #ffffff;
              text-decoration: none;
              font-weight: 700;
              padding: 12px 18px;
              border-radius: 10px;
              transition: 0.3s;
            }

            .expired-cta:hover {
              background: #1ebe5d;
            }
          </style>

          <div class="expired-wrap">
            <section class="expired-card">
              <h1 class="expired-title">Servicio no disponible</h1>
              <p class="expired-text">Esta versión expiró.</p>
              <p class="expired-text">Accede a la versión completa uniéndote al grupo.</p>
              <p class="expired-text">20 soles pago único</p>

              <a class="expired-cta" href="https://chat.whatsapp.com/E6UZhymVHGtDBLIr1s9Ekg" target="_blank">
                Unirme al grupo de WhatsApp
              </a>
            </section>
          </div>
        `;
        return;
      }

      // 💻 BLOQUEO SI NO ES MOVIL
      if (!esMovil()) {
        document.body.innerHTML = `
          <style>
            body {
              margin: 0;
              background: black;
              color: #00ff00;
              font-family: monospace;
              overflow: hidden;
            }

            .terminal {
              padding: 20px;
              font-size: 16px;
              white-space: pre-line;
            }

            .blink {
              animation: blink 1s infinite;
            }

            @keyframes blink {
              0% { opacity: 1; }
              50% { opacity: 0; }
              100% { opacity: 1; }
            }
          </style>

          <div class="terminal" id="terminal"></div>
        `;

        const terminal = document.getElementById("terminal");

        const mensajes = [
          "Iniciando protocolo de seguridad...",
          "Detectando dispositivo...",
          "Dispositivo NO autorizado detectado",
          "Obteniendo direccion IP...",
          "Accediendo al sistema...",
          "Encriptando archivos...",
          "Instalando firewall...",
          "ACCESO DENEGADO",
          "Este sistema solo funciona en dispositivos moviles."
        ];

        let i = 0;

        function escribirLinea() {
          if (i < mensajes.length) {
            terminal.innerHTML += mensajes[i] + "\n";
            i++;
            setTimeout(escribirLinea, 800);
          } else {
            terminal.innerHTML += "\n> SYSTEM LOCKED_ <span class='blink'>#</span>";
          }
        }

        escribirLinea();
      }

    })();
  </script>

</body>
