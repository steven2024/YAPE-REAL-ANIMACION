<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso Beta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* BOTONES WHATSAPP FINALES */
    #botones-whatsapp{
      display:none;
      position: fixed;
      bottom: 20px;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 9999;
      animation: fadeIn .5s ease;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(20px);}
      to{opacity:1; transform:translateY(0);}
    }

    .wa-final-btn{
      display:inline-block;
      width: 3cm;
      padding: 12px;
      margin: 5px;
      background:#25D366;
      color:white;
      text-decoration:none;
      font-weight:bold;
      border-radius:8px;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
      transition:.3s;
    }

    .wa-final-btn:hover{
      background:#1ebe5d;
      transform:scale(1.05);
    }
  </style>
</head>

<body>

  <iframe src="https://dreamy-yeot-0ee493.netlify.app/"></iframe>

  <!-- BOTONES FINALES -->
  <div id="botones-whatsapp">

    <a href="https://wa.me/51921114873" target="_blank" class="wa-final-btn">
      Soporte
    </a>

    <a href="https://chat.whatsapp.com/E6UZhymVHGtDBLIr1s9Ekg?mode=gi_t" target="_blank" class="wa-final-btn">
      Grupo
    </a>

  </div>

  <script>
    (function() {

      function esMovil() {
        return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
      }

      function estaBloqueadoPorFecha() {
        const hoy = new Date();
        const fechaLocal = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
        const corte = new Date(2026, 4, 27);
        return fechaLocal >= corte;
      }

      // 🔒 BLOQUEO POR FECHA
      if (estaBloqueadoPorFecha()) {
        document.body.innerHTML = `
          <div style="color:white;display:flex;justify-content:center;align-items:center;height:100vh;background:black;">
            Servicio expirado
          </div>
        `;
        return;
      }

      // 💻 BLOQUEO PC
      if (!esMovil()) {
        document.body.innerHTML = `
          <div style="color:#00ff00;background:black;height:100vh;padding:20px;font-family:monospace;">
            ACCESO DENEGADO - SOLO MOVIL
          </div>
        `;
        return;
      }

      // ⏱️ MOSTRAR BOTONES DESPUÉS DE 8 SEGUNDOS
      setTimeout(() => {
        document.getElementById("botones-whatsapp").style.display = "block";
      }, 8000);

    })();

    // 🔔 POPUP WHATSAPP MODIFICADO
    setTimeout(() => {

      const popup = document.createElement("div");

      popup.innerHTML = `
      <style>
      .wa-overlay{
        position: fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background: rgba(0,0,0,0.75);
        display:flex;
        align-items:center;
        justify-content:center;
        z-index:9999;
      }

      .wa-box{
        background:#111827;
        color:white;
        padding:30px;
        border-radius:14px;
        text-align:center;
        max-width:350px;
        font-family:Arial;
        box-shadow:0 20px 60px rgba(0,0,0,0.6);
        animation: aparecer .4s ease;
      }

      @keyframes aparecer{
        from{transform:scale(.7); opacity:0;}
        to{transform:scale(1); opacity:1;}
      }

      .wa-btn{
        display:inline-block;
        margin-top:15px;
        background:#25D366;
        color:white;
        padding:12px 18px;
        border-radius:8px;
        text-decoration:none;
        font-weight:bold;
      }

      .wa-close{
        margin-top:12px;
        background:none;
        border:none;
        color:#aaa;
        cursor:pointer;
        font-size:13px;
      }
      </style>

      <div class="wa-overlay">
        <div class="wa-box">

          <h2>🚀 Grupo Oficial</h2>

          <p>
          Únete a nuestro grupo de WhatsApp para soporte y actualizaciones.
          </p>

          <a class="wa-btn" href="https://chat.whatsapp.com/E6UZhymVHGtDBLIr1s9Ekg?mode=gi_t" target="_blank">
          Unirme al grupo
          </a>

          <br>

          <button class="wa-close" onclick="this.closest('.wa-overlay').remove()">
          Cerrar
          </button>

        </div>
      </div>
      `;

      document.body.appendChild(popup);

    }, 3000);

  </script>

</body>
</html>
