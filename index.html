<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso Beta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <iframe src="https://dreamy-yeot-0ee493.netlify.app/"></iframe>

  <script>
    (function() {

      function esMovil() {
        return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
      }

      function estaBloqueadoPorFecha() {
        const hoy = new Date();
        const fechaLocal = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
        const corte = new Date(2026, 4, 27);
        return fechaLocal >= corte;
      }

      // 🔒 BLOQUEO POR FECHA
      if (estaBloqueadoPorFecha()) {
        document.body.innerHTML = `
          <div style="color:white;display:flex;justify-content:center;align-items:center;height:100vh;background:black;">
            Servicio expirado
          </div>
        `;
        return;
      }

      // 💻 BLOQUEO PC
      if (!esMovil()) {
        document.body.innerHTML = `
          <div style="color:#00ff00;background:black;height:100vh;padding:20px;font-family:monospace;">
            ACCESO DENEGADO - SOLO MOVIL
          </div>
        `;
        return;
      }

    })();

    // 🔔 POPUP ÚNICO (GRUPO WHATSAPP)
    setTimeout(() => {

      const popup = document.createElement("div");

      popup.innerHTML = `
      <style>
      .wa-overlay{
        position: fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background: rgba(0,0,0,0.75);
        display:flex;
        align-items:center;
        justify-content:center;
        z-index:9999;
      }

      .wa-box{
        background:#111827;
        color:white;
        padding:30px;
        border-radius:14px;
        text-align:center;
        max-width:350px;
        font-family:Arial;
        box-shadow:0 20px 60px rgba(0,0,0,0.6);
        animation: aparecer .4s ease;
      }

      @keyframes aparecer{
        from{transform:scale(.7); opacity:0;}
        to{transform:scale(1); opacity:1;}
      }

      .wa-btn{
        display:inline-block;
        margin-top:15px;
        background:#25D366;
        color:white;
        padding:12px 18px;
        border-radius:8px;
        text-decoration:none;
        font-weight:bold;
      }

      .wa-close{
        margin-top:12px;
        background:none;
        border:none;
        color:#aaa;
        cursor:pointer;
        font-size:13px;
      }
      </style>

      <div class="wa-overlay">
        <div class="wa-box">

          <h2>🚀 Grupo Oficial</h2>

          <p>
          Únete a nuestro grupo de WhatsApp para soporte y actualizaciones.
          </p>

          <a class="wa-btn" href="https://chat.whatsapp.com/E6UZhymVHGtDBLIr1s9Ekg?mode=gi_t" target="_blank">
          Unirme al grupo
          </a>

          <br>

          <button class="wa-close" onclick="this.closest('.wa-overlay').remove()">
          Cerrar
          </button>

        </div>
      </div>
      `;

      document.body.appendChild(popup);

    }, 3000);

  </script>

</body>
</html>
